name: Florida

on:
  workflow_dispatch:
  push:
    branches: ["main", "ci"]
    paths:
      - ".github/workflows/build.yml"
      - "patches/**"

jobs:
  check_version:
    runs-on: ubuntu-22.04
    outputs:
      FRIDA_VERSION: "16.5.7"
      ALREADY_RELEASE: "0"
    steps:
      - run: echo "Pinned Frida version 16.5.7 for patch compatibility"

  create_release:
    needs: check_version
    runs-on: ubuntu-22.04
    if: needs.check_version.outputs.ALREADY_RELEASE != '1'
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        id: createRelease
        name: Create Runner Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          name: "${{ needs.check_version.outputs.FRIDA_VERSION }}"
          prerelease: false

  android_build:
    runs-on: ubuntu-22.04
    needs: [check_version, create_release]
    permissions:
      contents: write
    env:
      FRIDA_VERSION: "16.5.7"

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: "temurin"
        java-version: "17"

    - name: Setup Android NDK
      id: setup-ndk
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d
        local-cache: false
        link-to-sdk: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: install dependencies
      run: |
        sudo apt-get update && DEBIAN_FRONTEND=noninteractive sudo apt-get install build-essential tree ninja-build gcc-multilib g++-multilib lib32stdc++-9-dev flex bison ruby ruby-dev python3-requests python3-setuptools python3-dev python3-pip libc6-dev libc6-dev-i386 -y
        sudo gem install fpm -v 1.11.0 --no-document
        python3 -m pip install lief graphlib

    - name: build frida for Android
      shell: bash
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

        export ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}
        echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT"

        git clone --recurse-submodules --branch 16.5.7 https://github.com/frida/frida
        cd frida
        for path in ../patches/*
        do
          name=$(basename $path)
          real=$(realpath $path)
          echo "Apply patches in $real to frida/subprojects/$name"
          cd subprojects/$name
          git am ../../../patches/$name/*.patch
          cd ../..
        done
        cd ..

        ARCHES="android-arm android-arm64 android-x86 android-x86_64"
        for ARCH in $ARCHES
        do
          mkdir build-$ARCH
          cd build-$ARCH
          ../frida/configure --host=$ARCH
          make
          cd ..
        done

    - name: package build result for Android
      shell: bash
      run: |
        mkdir -p assets

        for ARCH in arm arm64 x86 x86_64; do
          cp build-android-$ARCH/subprojects/frida-core/server/frida-server assets/florida-server-16.5.7-android-$ARCH
          gzip -f assets/florida-server-16.5.7-android-$ARCH

          cp build-android-$ARCH/subprojects/frida-core/inject/frida-inject assets/florida-inject-16.5.7-android-$ARCH
          gzip -f assets/florida-inject-16.5.7-android-$ARCH

          cp build-android-$ARCH/subprojects/frida-core/lib/gadget/frida-gadget.so assets/florida-gadget-16.5.7-android-$ARCH.so
          gzip -f assets/florida-gadget-16.5.7-android-$ARCH.so
        done

        ls -la assets/

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "16.5.7"
        files: |
          assets/florida-server-16.5.7-android-arm.gz
          assets/florida-server-16.5.7-android-arm64.gz
          assets/florida-server-16.5.7-android-x86.gz
          assets/florida-server-16.5.7-android-x86_64.gz
          assets/florida-inject-16.5.7-android-arm.gz
          assets/florida-inject-16.5.7-android-arm64.gz
          assets/florida-inject-16.5.7-android-x86.gz
          assets/florida-inject-16.5.7-android-x86_64.gz
          assets/florida-gadget-16.5.7-android-arm.so.gz
          assets/florida-gadget-16.5.7-android-arm64.so.gz
          assets/florida-gadget-16.5.7-android-x86.so.gz
          assets/florida-gadget-16.5.7-android-x86_64.so.gz
